name: Run AI Mega Bot 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '15 0,6,12,18 * * *'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'miniapp/**'

concurrency:
  group: bot-session
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ffmpeg for video processing
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg 2>/dev/null || echo "ffmpeg not available"

      - name: Create data directory
        run: mkdir -p data

      - name: Run AI Mega Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          BOT_USERNAME: aimega_bot
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          API_SECRET: ${{ secrets.API_SECRET }}
          DB_PATH: data/bot.db
          LOG_LEVEL: INFO
        run: |
          python -m bot.main

      - name: Trigger next session
        if: always()
        run: |
          gh workflow run run-bot.yml
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}

  keep-alive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Trigger bot workflow
        run: |
          gh workflow run run-bot.yml
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
