name: Keep Alive Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if bot is running
        env:
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Check for active workflow runs
          ACTIVE=$(curl -s -H "Authorization: token $GH_PAT_TOKEN" \
            "https://api.github.com/repos/$GH_REPO/actions/runs?status=in_progress&per_page=5" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          for r in runs:
              if r['name'] == 'Run AI Mega Bot 24/7':
                  print('RUNNING')
                  sys.exit(0)
          print('NOT_RUNNING')
          ")

          echo "Bot status: $ACTIVE"

          if [ "$ACTIVE" = "NOT_RUNNING" ]; then
            echo "Bot is not running. Triggering run-bot workflow..."
            curl -s -X POST \
              -H "Authorization: token $GH_PAT_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$GH_REPO/actions/workflows/run-bot.yml/dispatches" \
              -d '{"ref":"main"}'
            echo "Triggered run-bot.yml"
          else
            echo "Bot is running. No action needed."
          fi
