version: '3.8'

services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ai-telegram-bot
    restart: always
    env_file:
      - ../.env
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
  bot_logs:
